<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .entete {
    border-bottom: 2px solid black;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
}

.logo {
    width: 80px;
    height: 80px;
    border: 2px solid black;
    border-radius: 50%;
    background-color: rgb(106, 26, 26);

}

.menu {
    width: 35%;
    height: 30px;
    display: flex;
    justify-content: space-around;
  
}

.rect {
    width: 20%;
    height: 15px;
    border: 2px solid black;
    border-radius: 10px;
background-color: rgb(19, 75, 118);
}

.bigrectangle {
    width: 90%;
    height: 350px;
    border: 2px solid black;
    margin: 40px auto;
    border-radius: 12px;
    background:url("image.webp") center/cover no-repeat; 
    display: flex;
    justify-content: center;
    flex-direction: column;
    align-items: center;
}
.coucou{
    color: white;
}
.title{
    color: white;
    

}

.petitrectangle {
    width: 13%;
    height: 15px;
    border: 2px solid black;
    margin: 0 auto;
    border-radius: 12px;
}

.contentquatrerectangle {

    display: flex;
    justify-content: space-around;
    margin: 20px auto;
    flex-wrap: wrap;
    gap: 30px;
    width: 90%;

}

.rectangle4 {
    width: 48%;
    height: 200px;
    border: 2px solid black;
    border-radius: 12px;

}

.contentsix {

    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 30px;
    margin: 40px;
}

.sixrectangle {
    border: 2px solid black;
    width: 30%;
    height: 250px;
    border-radius: 12px;
}

.rect4 {
    border: 2px solid black;
    width: 23%;
    height: 150px;
    border-radius: 12px;
}
.contentquatrerectangleS {

    display: flex;
    justify-content: space-between ;
    margin: 20px auto;
    width: 90%;

}
.bigrectangleS {
    width: 90%;
    height: 300px;
    border: 2px solid black;
    margin: 40px auto;
    border-radius: 12px;
}
.contentrond{
    
    width: 10%;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;

}
.rond{
    width: 10px;
    height: 10px;
    border: 2px solid black;
    border-radius:50%;

}
.footer{
    width: 90%;
    height: 150px;
    border: 2px solid black;
    border-radius: 12px;
    margin: 15px auto;
}
.btn1{
    background-color: aqua;
    padding: 15px;
    border-radius: 12px;
    color: rgb(0, 0, 0);
    border: 2px solid white;
    font-size: 20px;



}
.btn2{
    background-color: rgb(0, 0, 0);
    padding: 15px;
    border-radius: 12px;
    color:white;
border: 2px solid aqua;
    font-size: 20px;
}
.btn1:hover{
    background-color: white;
    color: aqua;
}
    </style>
</head>

<body>
    <div class="entete">
        <div class="logo"></div>
        <div class="menu">
            <div class="rect"></div>
            <div class="rect"></div>
            <div class="rect"></div>
            <div class="rect"></div>
        </div>
    </div>
    <div class="bigrectangle">
        <h1 class="title">Titre1</h1>
        <p class="coucou">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quos et nemo cum. Placeat ex quasi
            laudantium ullam

        </p>
        <div>
        <button class="btn1">Voir plus</button>
        <button class="btn2">Contactez-nous</button>
        </div>
    </div>
    <div class="petitrectangle"></div>
    <div class="contentquatrerectangle">
        <div class="rectangle4"></div>
        <div class="rectangle4"></div>
        <div class="rectangle4"></div>
        <div class="rectangle4"></div>
    </div>
    <div class="petitrectangle"></div>
    <div class="contentsix">
        <div class="sixrectangle"></div>
        <div class="sixrectangle"></div>
        <div class="sixrectangle"></div>
        <div class="sixrectangle"></div>
        <div class="sixrectangle"></div>
        <div class="sixrectangle"></div>
    </div>
    <div class="petitrectangle"></div>
    <div class="contentquatrerectangleS">
        <div class="rect4"></div>
        <div class="rect4"></div>
        <div class="rect4"></div>
        <div class="rect4"></div>
    </div>

    <div class="bigrectangleS"></div>
    <div class="contentrond">
        <div class="rond"></div>
        <div class="rond"></div>
        <div class="rond"></div>

    </div>

</html>
