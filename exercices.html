<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Élégance</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f6f3ef;
}

/* HEADER */
header{
    background:chocolate;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}

/* HERO */
.rect {
    width:90%;
    margin:30px auto;
    height:320px;
    border-radius:15px;
    background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085') center/cover;
    position:relative;
}

.rect::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
    border-radius:15px;
}

.rect-content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:1;
    text-align:center;
}

.rect button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:chocolate;
}

/* SECTION */
.section{
    width:90%;
    margin:auto;
    text-align:center;
    margin-top:40px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
}

/* GALERIE */
.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:20px;
}

.gallery-item{
    height:180px;
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.gallery-item img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.5);
    color:white;
    padding:10px;
}

/* NEWSLETTER */
.newsletter {
    background:white;
    width:90%;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

.newsletter input {
    width:70%;
    padding:10px;
    margin:10px;
}

.newsletter button {
    background:chocolate;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius: 6px;
}

/* FOOTER */
footer{
    background:chocolate;
    color:white;
    text-align:center;
    padding:15px;
}

</style>
</head>

<body>

<header>
    <h2>CE</h2>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">À propos</a>
        <a href="#">Galerie</a>
        <a href="#">Contact</a>
      
    </nav>
</header>

<!-- rect -->
<div class="rect">
    <div class="rect-content">
        <h1>Bienvenue au Café Élégance</h1>
        <p>Le goût du café dans un cadre raffiné</p>
        <button>Découvrir</button>
    </div>
</div>

<!-- A PROPOS -->
<div class="section">
    <h2>À propos</h2>

    <div class="cards">
        <div class="card">Notre histoire</div>
        <div class="card">Nos produits</div>
        <div class="card">Notre ambiance</div>
        <div class="card">Notre promesse</div>
    </div>
</div>

<!-- GALERIE -->
<div class="section">
    <h2>Galerie</h2>

    <div class="gallery">

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
            <div class="overlay">Café latte</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
            <div class="overlay">Petit déjeuner</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543">
            <div class="overlay">Desserts</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
            <div class="overlay">Expresso</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735">
            <div class="overlay">Détente</div>
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
            <div class="overlay">Ambiance</div>
        </div>

    </div>
</div>

<!-- NEWSLETTER -->
<div class="newsletter">
    <h2>Newsletter</h2>
    <input type="text" placeholder="Nom"><br>
    <input type="email" placeholder="Email"><br>
    <button>Envoyer</button>
</div>

<footer>
    © 2025 Café Élégance
</footer>

</body>
</html>
